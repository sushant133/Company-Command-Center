<!doctype html>
<html lang="en">
  <head>
    <!-- Meta Tags -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-Powered Multi-Company Dashboard for managing multiple organizations efficiently with real-time insights and analytics." />
    <meta name="keywords" content="dashboard, multi-company, management, analytics, projects, tasks" />
    <meta name="author" content="Your Company Name" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Open Graph Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI Executive Dashboard" />
    <meta property="og:description" content="Manage multiple companies and projects from a single intelligent dashboard." />
    <meta property="og:site_name" content="AI Executive Dashboard" />
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Executive Dashboard" />
    <meta name="twitter:description" content="Manage multiple companies and projects from a single intelligent dashboard." />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect to External Resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    
    <title>AI Executive Dashboard</title>

    <style>
      /* ============================================
         CSS Reset and Base Styles
         ============================================ */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f8fafc;
        color: #1e293b;
        line-height: 1.5;
        text-rendering: optimizeLegibility;
        overflow-wrap: break-word;
      }

      #root {
        min-height: 100vh;
      }

      /* ============================================
         Loading Screen Styles
         ============================================ */
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }

      .loading-screen.hidden {
        display: none;
        opacity: 0;
      }

      .loading-spinner {
        position: relative;
        width: 60px;
        height: 60px;
      }

      .loading-spinner::before {
        content: '';
        position: absolute;
        inset: 0;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        margin-top: 20px;
        color: #94a3b8;
        font-size: 14px;
        text-align: center;
        font-weight: 500;
      }

      /* ============================================
         Scrollbar Styles
         ============================================ */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
        transition: background 0.2s;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: #cbd5e1 #f1f5f9;
      }

      /* ============================================
         Selection Styles
         ============================================ */
      ::selection {
        background-color: #0f172a;
        color: #ffffff;
      }

      ::-moz-selection {
        background-color: #0f172a;
        color: #ffffff;
      }

      /* ============================================
         Link Styles
         ============================================ */
      a {
        color: #3b82f6;
        text-decoration: none;
        transition: color 0.2s;
      }

      a:hover {
        color: #1e40af;
      }

      /* ============================================
         Accessibility
         ============================================ */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* ============================================
         Print Styles
         ============================================ */
      @media print {
        body {
          background: white;
          color: black;
        }

        .no-print {
          display: none !important;
        }
      }
    </style>
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="text-center">
        <div class="loading-spinner"></div>
        <p class="loading-text">Initializing Dashboard...</p>
      </div>
    </div>

    <!-- Root Element for React -->
    <div id="root"></div>

    <!-- Vite Entry Point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide Loading Screen Script -->
    <script>
      // Hide loading screen when DOM is ready
      document.addEventListener('DOMContentLoaded', () => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen) {
          setTimeout(() => {
            loadingScreen.classList.add('hidden');
          }, 500);
        }
      });

      // Fallback: Hide loading screen when page fully loads
      window.addEventListener('load', () => {
        const loadingScreen = document.getElementById('loading-screen');
        if (loadingScreen && !loadingScreen.classList.contains('hidden')) {
          loadingScreen.classList.add('hidden');
        }
      });

      // Check for required browser features
      if (typeof localStorage === 'undefined') {
        console.warn('LocalStorage is not available. Some features may not work properly.');
      }

      if (typeof fetch === 'undefined') {
        document.body.innerHTML = `
          <div style="
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
          ">
            <div style="
              text-align: center;
              color: #f8fafc;
              max-width: 600px;
            ">
              <h1 style="font-size: 28px; margin-bottom: 10px;">Browser Not Supported</h1>
              <p style="font-size: 16px; color: #cbd5e1;">
                Your browser is too old to run this application. Please upgrade to a modern browser like Chrome, Firefox, Safari, or Edge.
              </p>
            </div>
          </div>
        `;
      }
    </script>

    <!-- No-JS Fallback -->
    <noscript>
      <div style="
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: 20px;
      ">
        <div style="
          text-align: center;
          color: #f8fafc;
          max-width: 600px;
        ">
          <h1 style="font-size: 28px; margin-bottom: 10px; font-weight: 700;">JavaScript Required</h1>
          <p style="font-size: 16px; color: #cbd5e1; margin-bottom: 20px;">
            This application requires JavaScript to be enabled in your browser. 
            Please enable JavaScript in your browser settings and refresh the page.
          </p>
          <p style="font-size: 14px; color: #94a3b8;">
            If you continue to see this message, try clearing your browser cache or using a different browser.
          </p>
        </div>
      </div>
    </noscript>
  </body>
</html>
